name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"

      - name: Respaldar pubspec
        run: |
          mkdir -p /tmp/keep
          cp pubspec.yaml /tmp/keep/pubspec.yaml
          [ -f pubspec.lock ] && cp pubspec.lock /tmp/keep/pubspec.lock || true

      - name: Generar andamiaje android
        run: flutter create --org com.tuempresa --project-name gestor_docs --platforms=android .

      - name: Restaurar pubspec
        run: |
          cp /tmp/keep/pubspec.yaml pubspec.yaml
          [ -f /tmp/keep/pubspec.lock ] && cp /tmp/keep/pubspec.lock pubspec.lock || true

      - name: Permisos de almacenamiento en el manifest
        run: |
          perl -0pi -e 's{(<manifest[^>]*>)}{$1\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>}' android/app/src/main/AndroidManifest.xml || true
          echo "--- Manifest resultante ---"
          cat android/app/src/main/AndroidManifest.xml

      - name: Instalar dependencias
        run: flutter pub get

      - name: Forzar compileSdk 36 en los plugins
        run: |
          FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          PATCHED=0
          while IFS= read -r -d '' f; do
            sed -i -E 's/(compileSdk(Version)?)[[:space:]]+[0-9]+/\1 36/g; s/(compileSdk)[[:space:]]*=[[:space:]]*[0-9]+/\1 = 36/g' "$f"
            PATCHED=$((PATCHED+1))
          done < <(find "$HOME/.pub-cache" "${PUB_CACHE:-/nonexistent}" "$FLUTTER_ROOT/.pub-cache" -path "*/android/build.gradle*" -print0 2>/dev/null)
          echo "Plugins parcheados a compileSdk 36: $PATCHED"

      - name: Analizar
        run: flutter analyze || true

      - name: Compilar APK debug
        run: flutter build apk --debug

      - name: Publicar APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gestor-docs-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
