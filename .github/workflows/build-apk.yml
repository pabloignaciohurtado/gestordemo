name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"

      - name: Respaldar config
        run: |
          mkdir -p /tmp/keep
          cp pubspec.yaml /tmp/keep/pubspec.yaml
          [ -f pubspec.lock ] && cp pubspec.lock /tmp/keep/pubspec.lock || true

      - name: Generar andamiaje
        run: flutter create --org com.tuempresa --project-name gestor_docs --platforms=android .

      - name: Restaurar config
        run: |
          cp /tmp/keep/pubspec.yaml pubspec.yaml
          [ -f /tmp/keep/pubspec.lock ] && cp /tmp/keep/pubspec.lock pubspec.lock || true

      - name: Fijar SDK versions
        run: |
          F=android/app/build.gradle.kts
          sed -i -E 's/compileSdk[ =]+flutter\.compileSdkVersion/compileSdk = 36/' "$F"
          sed -i -E 's/compileSdk[ =]+[0-9]+/compileSdk = 36/' "$F"
          sed -i -E 's/minSdk[ =]+flutter\.minSdkVersion/minSdk = 24/' "$F"
          sed -i -E 's/targetSdk[ =]+flutter\.targetSdkVersion/targetSdk = 36/' "$F"
          echo "----- build.gradle.kts -----"
          cat "$F"

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar
        run: flutter analyze || true

      - name: Compilar APK debug
        run: flutter build apk --debug

      - name: Publicar APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gestor-docs-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
