name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.44.4
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"

      - name: Flutter version
        run: flutter --version

      - name: Respaldar configuracion propia
        run: |
          mkdir -p /tmp/keep
          cp pubspec.yaml /tmp/keep/pubspec.yaml
          [ -f pubspec.lock ] && cp pubspec.lock /tmp/keep/pubspec.lock || true
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml /tmp/keep/AndroidManifest.xml
          fi

      - name: Generar andamiaje nativo
        run: flutter create --org com.tuempresa --project-name gestor_docs --platforms=android .

      - name: Restaurar configuracion propia
        run: |
          cp /tmp/keep/pubspec.yaml pubspec.yaml
          [ -f /tmp/keep/pubspec.lock ] && cp /tmp/keep/pubspec.lock pubspec.lock || true
          if [ -f /tmp/keep/AndroidManifest.xml ]; then
            cp /tmp/keep/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Fijar SDK versions
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' android/app/build.gradle
          fi

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar
        run: flutter analyze || true

      - name: Compilar APK release
        run: flutter build apk --debug

      - name: Publicar APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gestor-docs-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
